<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Usman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="left-content">
      <h1>Get in Touch with Usman Sarwar</h1>
      <p>We welcome your inquiries and collaborations. Reach out to discuss opportunities:</p>
      <ul>
        <li>Email Us for Further Information</li>
        <li>Connect for Collaborative Projects</li>
        <li>Request Technical Support</li>
        <li>Inquire About Our Services</li>
      </ul>
    </div>
    <form class="contact-form">
      <h2>Get in touch</h2>
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="first-name" placeholder="First Name" required>

      <label for="last-name">Last Name</label>
      <input type="text" id="last-name" name="last-name" placeholder="Last Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="name@domain.com" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4" placeholder="Your message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</body>
</html>
